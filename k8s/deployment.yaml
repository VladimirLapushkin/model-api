apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-api
  labels:
    app: fraud-api
spec:
  replicas: 4
  selector:
    matchLabels:
      app: fraud-api
  template:
    metadata:
      labels:
        app: fraud-api
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: fraud-api
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: S3_ENDPOINT_URL
          value: "https://storage.yandexcloud.net"
        - name: YC_CLEAN_BUCKET_PATH
          value: "s3a://mlops-2025-dz3/clean/model"
        - name: YC_CLEAN_BUCKET_AK
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: access-key
        - name: YC_CLEAN_BUCKET_SK
          valueFrom:
            secretKeyRef:
              name: s3-creds
              key: secret-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "3Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 40
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 20
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 18
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-api
  labels:
    app: fraud-api
spec:
  selector:
    app: fraud-api
  ports:
  - name: http
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-api
  minReplicas: 4
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Max
